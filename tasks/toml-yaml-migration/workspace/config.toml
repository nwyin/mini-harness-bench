[app]
name = "myservice"
version = "2.4.1"
debug = false
max_connections = 100
allowed_hosts = ["localhost", "0.0.0.0", "myservice.internal"]

[app.timeouts]
connect = 5
read = 30
write = 30
idle = 300

[database]
host = "db.internal.corp"
port = 5432
name = "myservice_prod"
ssl = true
pool_size = 20

[database.replica]
host = "db-replica.internal.corp"
port = 5432
read_only = true

[logging]
level = "INFO"
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
handlers = ["console", "file", "syslog"]

[logging.file]
path = "/var/log/myservice/app.log"
max_bytes = 10485760
backup_count = 5

[redis]
host = "redis.internal.corp"
port = 6379
db = 0
password = ""
key_prefix = "myservice:"

[features]
enable_caching = true
enable_rate_limiting = true
enable_metrics = false
beta_features = ["new-dashboard", "async-exports"]

[monitoring]
enabled = true
endpoint = "/metrics"
interval_seconds = 60
tags = ["service:myservice", "env:production", "region:us-east-1"]
