instruction: |
  A timezone bug was reported in `scheduler.py` and a fix was applied (see
  `BUGFIX.md` and git history). However, the fix introduced a new issue with
  relative scheduling.

  The original bug: tasks scheduled in non-UTC timezones fired at wrong times
  because the timezone offset was applied in the wrong direction.

  The attempted fix: force-convert all times to UTC immediately. But this broke
  relative scheduling — a task set to run "every day at 9am" in US/Eastern
  should fire at 9am Eastern time, not 9am UTC.

  Fix the scheduler so both absolute and relative timezone handling work correctly.
  Use git history to understand what changed. Run `pytest tests/ -v` to verify.
category: debugging
difficulty: hard
tier: full
tags: [debugging, timezone, git-history]
expert_time_estimate_min: 10
