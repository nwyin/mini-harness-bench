instruction: |
  Write a text extraction module `extractor.py` that extracts structured fields
  from messy, unstructured text. The module should expose these functions:

  - `extract_emails(text: str) -> list[str]`
    Extract all valid email addresses. Return them lowercased and deduplicated,
    sorted alphabetically.

  - `extract_dates(text: str) -> list[str]`
    Extract dates in any of these formats and normalize to YYYY-MM-DD:
    - YYYY-MM-DD (already normalized)
    - MM/DD/YYYY
    - DD-Mon-YYYY (e.g., 15-Jan-2024)
    - Month DD, YYYY (e.g., January 15, 2024)
    Return sorted and deduplicated.

  - `extract_phone_numbers(text: str) -> list[str]`
    Extract US phone numbers in any format and normalize to (XXX) XXX-XXXX:
    - (555) 123-4567
    - 555-123-4567
    - 555.123.4567
    - 5551234567
    - +1-555-123-4567
    - +1 (555) 123-4567
    Return sorted and deduplicated.

  - `extract_ipv4(text: str) -> list[str]`
    Extract valid IPv4 addresses (each octet 0-255). Return sorted and
    deduplicated. Sort by numeric value of the IP.

  - `extract_urls(text: str) -> list[str]`
    Extract URLs starting with http:// or https://. Return sorted and
    deduplicated.

  An example input file `example.txt` is provided for reference.

  Run `pytest tests/ -v` to verify your solution.
category: data-science
difficulty: medium
tier: standard
tags: [regex, extraction, text-processing]
expert_time_estimate_min: 5
